name: sessions
source:
  type: postgres
  connection:
    host: ${DB_HOST}
    port: 5432
    database: ${DB_NAME}
    user: ${DB_USER}
    password: ${DB_PASSWORD}
  table: sessions
description: This is a table that contains information about the type of activity and duration of the sessions for users.

columns:
  - name: session_id
    type: integer
    description: Unique identifier for the each session (Primary Key)
  - name: user_id
    type: integer
    description: Foreign key linking to the users table
  - name: session_date
    type: datetime
    description: The date when the session occurred (time granularity is day)
  - name: duration_minutes
    type: integer
    description: The duration of the session in minutes
  - name: activity_type
    type: string
    description: The type of activity that occurred during the session (e.g., browse, read, listen)
